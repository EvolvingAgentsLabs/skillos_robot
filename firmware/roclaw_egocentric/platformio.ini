; PlatformIO configuration for RoClaw Egocentric Firmware (Camera-Only)
; Board: ESP32-S3-CAM (or compatible S3 + OV2640 boards)
; No I2C / No IMU — minimal hardware requirements
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

; PSRAM for camera frame buffers
board_build.arduino.psram_type = opi
build_flags =
  -DBOARD_HAS_PSRAM
  -DCONFIG_SPIRAM_CACHE_WORKAROUND

lib_deps =
  waspinator/AccelStepper@^1.64

monitor_speed = 115200
upload_speed = 921600
