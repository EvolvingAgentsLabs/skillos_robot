<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="RoClaw stack — Cortex · Cerebellum · ESP32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="g1"/>
      <feGaussianBlur stdDeviation="8" result="g2"/>
      <feMerge><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00ff7f" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="scan" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#00ff7f" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#000"/>
  <rect width="1280" height="720" fill="url(#scan)"/>

  <!-- frame -->
  <text x="40" y="40" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#4ade80" filter="url(#glow)">┌─[ MCP://stack ]──────────────────────────── 5 tiers · L0-L4 · 200ms loop ──────┐</text>
  <text x="40" y="700" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#4ade80" filter="url(#glow)">└────────── perceive · plan · veto · move · dream ────────── ESP32-S3 · 8B ISA ─┘</text>

  <!-- tier badges (vertical stack on left) -->
  <g font-family="'SF Mono',monospace" font-size="11">
    <text x="60" y="92" fill="#bbf7d0" font-weight="700">TIER</text>
    <text x="60" y="148" fill="#00ff7f" filter="url(#glow)">L4</text>
    <text x="60" y="240" fill="#00ff7f" filter="url(#glow)">L3</text>
    <text x="60" y="368" fill="#00ff7f" filter="url(#glow)">L2</text>
    <text x="60" y="488" fill="#00ff7f" filter="url(#glow)">L1</text>
    <text x="60" y="600" fill="#ff4444" filter="url(#glow)">L0</text>
  </g>

  <!-- ============================================================ -->
  <!-- L4 · skillos / Cortex Memory                                 -->
  <!-- ============================================================ -->
  <g transform="translate(110, 70)">
    <rect width="1100" height="80" rx="10" fill="#001a14" stroke="url(#frameGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="26" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#bbf7d0">⌬ skillos · prefrontal cortex</text>
    <text x="20" y="46" font-family="'SF Mono',monospace" font-size="11" fill="#bbf7d0" opacity="0.85">user goal → hierarchical planner → strategy retrieval → trace consolidation → dream</text>
    <text x="20" y="66" font-family="'SF Mono',monospace" font-size="11" fill="#4ade80">$ "Go check the kitchen"  ▸  PLAN[ hallway → doorway → kitchen ]  ▸  STRATEGY[ avoid_furniture, prefer_lit_paths ]</text>
  </g>

  <!-- ============================================================ -->
  <!-- L3 · Cortex (planner + reactive controller)                  -->
  <!-- ============================================================ -->
  <g transform="translate(110, 170)">
    <rect width="1100" height="100" rx="10" fill="#001a14" stroke="url(#frameGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="26" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#bbf7d0">⌬ cortex · planner + reactive_controller</text>
    <!-- scene graph mini-viz -->
    <g transform="translate(20, 40)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">scene_graph · 3D spatial memory</text>
      <!-- nodes -->
      <circle cx="20"  cy="38" r="5" fill="#00ff7f" filter="url(#glow)"/>
      <circle cx="80"  cy="22" r="5" fill="#4ade80"/>
      <circle cx="160" cy="48" r="5" fill="#bbf7d0"/>
      <circle cx="240" cy="30" r="5" fill="#4ade80"/>
      <circle cx="320" cy="40" r="5" fill="#00ff7f"/>
      <!-- edges -->
      <g stroke="#4ade80" stroke-width="1" opacity="0.6">
        <line x1="20" y1="38" x2="80" y2="22"/>
        <line x1="80" y1="22" x2="160" y2="48"/>
        <line x1="160" y1="48" x2="240" y2="30"/>
        <line x1="240" y1="30" x2="320" y2="40"/>
        <line x1="20" y1="38" x2="160" y2="48"/>
      </g>
      <!-- labels -->
      <text x="20" y="58" text-anchor="middle" font-size="8" font-family="'SF Mono',monospace" fill="#bbf7d0" opacity="0.6">robot</text>
      <text x="80" y="14" text-anchor="middle" font-size="8" font-family="'SF Mono',monospace" fill="#bbf7d0" opacity="0.6">chair</text>
      <text x="160" y="62" text-anchor="middle" font-size="8" font-family="'SF Mono',monospace" fill="#bbf7d0" opacity="0.6">door</text>
      <text x="240" y="22" text-anchor="middle" font-size="8" font-family="'SF Mono',monospace" fill="#bbf7d0" opacity="0.6">table</text>
      <text x="320" y="56" text-anchor="middle" font-size="8" font-family="'SF Mono',monospace" fill="#bbf7d0" opacity="0.6">cube*</text>
      <!-- pulse -->
      <circle cx="320" cy="40" r="9" fill="none" stroke="#00ff7f" stroke-width="1" filter="url(#strongGlow)" opacity="0">
        <animate attributeName="r" values="6;14;6" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0;0.9" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- reactive controller log -->
    <g transform="translate(420, 44)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">reactive_controller</text>
      <text x="0" y="16" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ target_bearing  -8.4°    (toward "red cube")</text>
      <text x="0" y="32" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ distance        128 cm</text>
      <text x="0" y="48" font-family="'SF Mono',monospace" font-size="10" fill="#00ff7f">▸ decision        rotate_cw(8°) → forward(40cm)</text>
    </g>

    <!-- strategies -->
    <g transform="translate(820, 44)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">strategies (.md)</text>
      <text x="0" y="16" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ avoid_furniture       (used 23×)</text>
      <text x="0" y="32" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ prefer_lit_paths      (used 12×)</text>
      <text x="0" y="48" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ short_burst_movement  (used 41×)</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- L2 · Cerebellum                                              -->
  <!-- ============================================================ -->
  <g transform="translate(110, 290)">
    <rect width="1100" height="120" rx="10" fill="#001a14" stroke="url(#frameGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="26" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#bbf7d0">⌬ cerebellum · vision + perception_policy</text>

    <!-- camera frame placeholder -->
    <g transform="translate(20, 40)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">camera frame · 320×240</text>
      <rect x="0" y="14" width="180" height="60" fill="#0a0a0f" stroke="#4ade80" stroke-width="1"/>
      <!-- mock subject: red cube box on green floor -->
      <rect x="10" y="24" width="160" height="40" fill="#001a0a"/>
      <rect x="120" y="42" width="20" height="14" fill="#ff4444" filter="url(#glow)"/>
      <!-- bbox -->
      <rect x="115" y="38" width="30" height="22" fill="none" stroke="#00ff7f" stroke-width="1.2" stroke-dasharray="3 2" filter="url(#glow)">
        <animate attributeName="stroke-dashoffset" values="0;5" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="140" y="50" text-anchor="middle" font-family="'SF Mono',monospace" font-size="6" fill="#00ff7f">red_cube 0.91</text>
    </g>

    <!-- inference details -->
    <g transform="translate(220, 44)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">qwen3-vl-2b · ollama :11434</text>
      <text x="0" y="16" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ box_2d         [115, 38, 145, 60]</text>
      <text x="0" y="32" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ label          red_cube</text>
      <text x="0" y="48" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ confidence     0.91</text>
      <text x="0" y="64" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ depth_est_cm   128</text>
      <text x="0" y="80" font-family="'SF Mono',monospace" font-size="10" fill="#00ff7f">▸ latency        184 ms  (NPU)</text>
    </g>

    <!-- vision_projector -->
    <g transform="translate(540, 44)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">vision_projector · 2D → 3D</text>
      <text x="0" y="16" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ box_2d → arena_xyz</text>
      <text x="0" y="32" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ x        +0.74 m</text>
      <text x="0" y="48" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ y        +0.12 m</text>
      <text x="0" y="64" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ pose     bearing -8.4°</text>
    </g>

    <!-- attention heatmap (mini) -->
    <g transform="translate(820, 44)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">attention.layer[7]</text>
      <g>
        <rect x="0" y="14" width="10" height="10" fill="#4ade80" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/></rect>
        <rect x="12" y="14" width="10" height="10" fill="#00ff7f" opacity="0.85"><animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="-0.1s" repeatCount="indefinite"/></rect>
        <rect x="24" y="14" width="10" height="10" fill="#bbf7d0" opacity="0.95"><animate attributeName="opacity" values="0.95;1;0.95" dur="2s" begin="-0.2s" repeatCount="indefinite"/></rect>
        <rect x="36" y="14" width="10" height="10" fill="#00ff7f" opacity="0.8"><animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="-0.3s" repeatCount="indefinite"/></rect>
        <rect x="48" y="14" width="10" height="10" fill="#003319" opacity="0.4"/>
        <rect x="60" y="14" width="10" height="10" fill="#4ade80" opacity="0.7"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="-0.4s" repeatCount="indefinite"/></rect>
        <rect x="72" y="14" width="10" height="10" fill="#003319" opacity="0.4"/>
        <rect x="84" y="14" width="10" height="10" fill="#00ff7f" opacity="0.85"><animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="-0.5s" repeatCount="indefinite"/></rect>
        <rect x="0"  y="26" width="10" height="10" fill="#4ade80" opacity="0.6"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" begin="-0.15s" repeatCount="indefinite"/></rect>
        <rect x="12" y="26" width="10" height="10" fill="#003319" opacity="0.4"/>
        <rect x="24" y="26" width="10" height="10" fill="#00ff7f" opacity="0.8"><animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="-0.25s" repeatCount="indefinite"/></rect>
        <rect x="36" y="26" width="10" height="10" fill="#bbf7d0" opacity="0.92"><animate attributeName="opacity" values="0.92;1;0.92" dur="2s" begin="-0.35s" repeatCount="indefinite"/></rect>
        <rect x="48" y="26" width="10" height="10" fill="#4ade80" opacity="0.7"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="-0.45s" repeatCount="indefinite"/></rect>
        <rect x="60" y="26" width="10" height="10" fill="#00ff7f" opacity="0.83"><animate attributeName="opacity" values="0.83;1;0.83" dur="2s" begin="-0.55s" repeatCount="indefinite"/></rect>
        <rect x="72" y="26" width="10" height="10" fill="#003319" opacity="0.4"/>
        <rect x="84" y="26" width="10" height="10" fill="#bbf7d0" opacity="0.9"><animate attributeName="opacity" values="0.9;1;0.9" dur="2s" begin="-0.65s" repeatCount="indefinite"/></rect>
      </g>
      <text x="0" y="56" font-family="'SF Mono',monospace" font-size="9" fill="#bbf7d0" opacity="0.7">peak ▸ red_cube region</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- L1 · Bytecode + UDP                                          -->
  <!-- ============================================================ -->
  <g transform="translate(110, 430)">
    <rect width="1100" height="80" rx="10" fill="#001a14" stroke="url(#frameGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="26" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#bbf7d0">⌬ bytecode_compiler · 8-byte ISA v2 · UDP :4210</text>

    <!-- frame visualization -->
    <g transform="translate(20, 36)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">frame layout</text>
      <g transform="translate(0, 14)">
        <rect width="36" height="22" fill="#00ff7f"/><text x="18" y="16" text-anchor="middle" font-size="10" font-family="'SF Mono',monospace" fill="#000" font-weight="700">AA</text>
        <rect x="40" width="36" height="22" fill="#4ade80"/><text x="58" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">SEQ</text>
        <rect x="80" width="36" height="22" fill="#00ff7f"/><text x="98" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">OP</text>
        <rect x="120" width="36" height="22" fill="#bbf7d0"/><text x="138" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">P1</text>
        <rect x="160" width="36" height="22" fill="#bbf7d0"/><text x="178" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">P2</text>
        <rect x="200" width="36" height="22" fill="#4ade80"/><text x="218" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">FLG</text>
        <rect x="240" width="36" height="22" fill="#00ff7f"/><text x="258" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">CRC</text>
        <rect x="280" width="36" height="22" fill="#00d4ff"/><text x="298" y="16" text-anchor="middle" font-size="9" font-family="'SF Mono',monospace" fill="#000">FF</text>
      </g>
      <text x="0" y="50" font-family="'SF Mono',monospace" font-size="9" fill="#bbf7d0" opacity="0.7">8 bytes · seq + ack · sub-millisecond</text>
    </g>

    <g transform="translate(420, 40)">
      <text font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">last sent</text>
      <text x="0" y="16" font-family="'SF Mono',monospace" font-size="11" fill="#00ff7f" filter="url(#glow)">AA 4F 02 28 00 02 6B FF</text>
      <text x="0" y="32" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0">▸ rotate_cw(8°)  ack=42ms</text>
    </g>

    <!-- packet flow animation -->
    <g transform="translate(720, 50)">
      <line x1="0" y1="0" x2="340" y2="0" stroke="#4ade80" stroke-width="1" opacity="0.55"/>
      <text x="0" y="-8" font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">UDP ▸ ESP32-S3</text>
      <text x="340" y="-8" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#4ade80">▸ telemetry back</text>
      <rect x="0" y="-3" width="14" height="6" fill="#00ff7f" filter="url(#glow)">
        <animate attributeName="x" values="-20;360;-20" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="-3" width="10" height="6" fill="#00d4ff" filter="url(#glow)" opacity="0.8">
        <animate attributeName="x" values="360;-20;360" dur="3.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- L0 · ReflexGuard                                             -->
  <!-- ============================================================ -->
  <g transform="translate(110, 530)">
    <rect width="1100" height="80" rx="10" fill="#1a0500" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="26" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#fca5a5">⚠ reflex_guard · pre-send collision veto · deterministic · always-on</text>
    <text x="20" y="46" font-family="'SF Mono',monospace" font-size="11" fill="#fca5a5" opacity="0.85">scene_graph + tof + bumper → if intersect_cone(0.4m) → veto + emit "STOP"</text>
    <text x="20" y="66" font-family="'SF Mono',monospace" font-size="11" fill="#fca5a5">▸ 50ms loop  ▸ shadow-mode by default  ▸ flips to active when --reflex=on</text>

    <!-- pulse indicator -->
    <circle cx="1060" cy="40" r="6" fill="#ff4444" filter="url(#strongGlow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="1078" y="44" font-family="'SF Mono',monospace" font-size="10" fill="#fca5a5">SHADOW</text>
  </g>

  <!-- arrows between tiers -->
  <g stroke="#4ade80" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.55" filter="url(#glow)">
    <path d="M 660 152 L 660 168"/>
    <path d="M 660 270 L 660 290"/>
    <path d="M 660 410 L 660 430"/>
    <path d="M 660 510 L 660 530"/>
  </g>
  <g fill="#4ade80" filter="url(#glow)">
    <polygon points="657,168 660,160 663,168"/>
    <polygon points="657,290 660,282 663,290"/>
    <polygon points="657,430 660,422 663,430"/>
    <polygon points="657,530 660,522 663,530"/>
  </g>

  <!-- live LED at very bottom-left -->
  <circle cx="50" cy="690" r="3" fill="#00ff7f" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="694" font-family="'SF Mono',monospace" font-size="10" fill="#bbf7d0" opacity="0.7">live</text>

  <!-- scan line -->
  <rect x="0" y="-2" width="1280" height="2" fill="#00d4ff" opacity="0.35" filter="url(#glow)">
    <animate attributeName="y" values="-4;720;-4" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.1;0.9;1" dur="9s" repeatCount="indefinite"/>
  </rect>
</svg>
